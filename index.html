<!DOCTYPE html>
<html lang="En-GB">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Map Camping Castell Montgrí</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a2e1a; color: #fff; min-height: 100vh; }

/* ── WELCOME ── */
#welcome-screen {
  position: fixed; inset: 0; background: #1a2e1a; z-index: 999;
  display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px;
}
#welcome-screen h1 { font-size: 22px; font-weight: 800; color: #a8d5a2; margin-bottom: 6px; text-align: center; }
#welcome-screen p  { font-size: 13px; color: #6b9e6b; margin-bottom: 28px; text-align: center; }
.welcome-card {
  background: #1e3320; border-radius: 18px; padding: 24px 20px;
  width: 100%; max-width: 340px; border: 1px solid #2d4a2d;
}
.welcome-card label { font-size: 11px; color: #6b9e6b; display: block; margin-bottom: 6px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
.welcome-card input {
  width: 100%; font-size: 20px; font-weight: 700;
  background: #162616; border: 1px solid #3d5c3d; border-radius: 10px;
  padding: 12px 14px; color: #e8f5e8; font-family: inherit; margin-bottom: 8px;
}
.welcome-card input:focus { outline: none; border-color: #22c55e; }
.date-row { font-size: 13px; color: #6b9e6b; margin-bottom: 20px; text-align: center; }
.btn-start {
  width: 100%; padding: 14px; background: #22c55e; color: #fff;
  border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer;
}
.btn-start:active { background: #16a34a; }

/* ── HEADER ── */
header {
  background: #1a2e1a; padding: 8px 10px;
  display: flex; align-items: center; justify-content: space-between; gap: 6px;
  border-bottom: 1px solid #2d4a2d; position: sticky; top: 0; z-index: 50;
}
#header-name { font-size: 12px; font-weight: 700; color: #a8d5a2; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.badge { background: #dc2626; color: white; font-size: 10px; font-weight: 700; border-radius: 99px; padding: 2px 7px; }
.header-btns { display: flex; gap: 5px; flex-shrink: 0; align-items: center; }
.btn { font-size: 11px; padding: 6px 10px; border-radius: 8px; cursor: pointer; border: none; font-weight: 700; white-space: nowrap; }
.btn:active { opacity: 0.75; }
.btn-green { background: #22c55e; color: #fff; }
.btn-red   { background: #dc2626; color: #fff; }
.btn-gray  { background: #3d5c3d; color: #c8e6c8; }
.btn-blue  { background: #1d4ed8; color: #fff; }
.btn-wa    { background: #25D366; color: #fff; }
.btn-pdf   { background: #7c3aed; color: #fff; }

#hint { text-align: center; font-size: 11px; color: #6b9e6b; padding: 5px 12px; background: #162616; }

/* ── MAP ── */
#map-wrapper { position: relative; width: 100%; overflow: hidden; }
#mapImg { width: 100%; display: block; }

.pin {
  position: absolute; transform: translate(-50%, -50%);
  cursor: pointer; z-index: 20;
  padding: 8px; margin: -8px; /* bigger tap area */
}
.pin-circle {
  width: 10px; height: 10px; background: #dc2626; border-radius: 50%;
  border: 1.5px solid white; box-shadow: 0 1px 5px rgba(0,0,0,0.6);
}
.pin:active .pin-circle { transform: scale(1.5); }

/* ── LIST ── */
#toggle-list {
  width: 100%; background: #1a2e1a; border: none; border-top: 1px solid #2d4a2d;
  color: #6b9e6b; font-size: 12px; padding: 7px; cursor: pointer; text-align: center; letter-spacing: 0.05em;
}
#list-panel { background: #162616; border-top: 1px solid #2d4a2d; max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
#list-panel.open { max-height: 400px; overflow-y: auto; }
.list-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px; border-bottom: 1px solid #1e3320; cursor: pointer; }
.list-item:active { background: #1e3320; }
.list-num { background: #dc2626; color: white; font-size: 11px; font-weight: 800; border-radius: 99px; min-width: 28px; height: 22px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; padding: 0 5px; }
.list-text { font-size: 13px; color: #c8e6c8; white-space: pre-wrap; word-break: break-word; flex: 1; line-height: 1.4; }

/* ── OVERLAYS ── */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.72); z-index: 200; align-items: flex-end; justify-content: center; }
.overlay.open { display: flex; }
.overlay.center { align-items: center; justify-content: center; }
.sheet {
  background: #1e3320; border-radius: 20px 20px 0 0; width: 100%; max-width: 520px;
  padding: 18px 16px 32px; border-top: 1px solid #2d4a2d; animation: slideUp 0.2s ease; max-height: 90vh; overflow-y: auto;
}
@keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.sheet-handle { width: 36px; height: 4px; background: #3d5c3d; border-radius: 2px; margin: 0 auto 14px; }
.sheet h2 { font-size: 16px; font-weight: 700; color: #a8d5a2; margin-bottom: 10px; }
.sheet label { font-size: 12px; color: #6b9e6b; display: block; margin-bottom: 4px; font-weight: 600; }
.sheet input[type=number], .sheet input[type=text] {
  width: 100%; font-size: 16px; background: #162616; border: 1px solid #3d5c3d;
  border-radius: 10px; padding: 10px 12px; color: #e8f5e8; font-family: inherit; margin-bottom: 10px;
}
.sheet input:focus, .sheet textarea:focus { outline: none; border-color: #22c55e; }
.sheet textarea {
  width: 100%; min-height: 90px; font-size: 14px; background: #162616;
  border: 1px solid #3d5c3d; border-radius: 10px; padding: 10px 12px;
  color: #e8f5e8; resize: vertical; font-family: inherit; line-height: 1.5;
}
.note-text {
  background: #162616; border: 1px solid #3d5c3d; border-radius: 10px; padding: 14px;
  font-size: 15px; line-height: 1.6; color: #e8f5e8; white-space: pre-wrap;
  word-break: break-word; min-height: 60px; margin-bottom: 14px;
}
.btn-row { display: flex; gap: 8px; margin-top: 10px; }
.btn-row .btn { flex: 1; text-align: center; padding: 11px; font-size: 12px; }
.share-textarea {
  width: 100%; height: 130px; background: #162616; border: 1px solid #3d5c3d;
  border-radius: 10px; padding: 10px; color: #c8e6c8; font-size: 12px;
  font-family: monospace; resize: none; margin-bottom: 10px;
}
.confirm-box { background: #1e3320; border-radius: 16px; padding: 24px 20px; width: 280px; text-align: center; border: 1px solid #2d4a2d; }
.confirm-box p { font-size: 15px; color: #c8e6c8; margin-bottom: 18px; line-height: 1.5; }
.confirm-box .btn-row { justify-content: center; }
.confirm-box .btn { flex: none; padding: 10px 22px; }
</style>
</head>
<body>

<!-- WELCOME -->
<div id="welcome-screen">
  <h1>🏕️ Castell Montgrí</h1>
  <p>Map bungalow annotations</p>
  <div class="welcome-card">
    <label>Il tuo nome</label>
    <input id="input-name" type="text" placeholder="Es: Vanessa" autocomplete="off" />
    <div class="date-row" id="welcome-date"></div>
    <button class="btn-start" id="btn-start">The day begins →</button>
  </div>
</div>

<!-- APP -->
<header>
  <div id="header-name">🏕️ —</div>
  <div class="header-btns">
    <span class="badge" id="count-badge">0</span>
    <button class="btn btn-wa"  id="btn-wa">📲 WhatsApp</button>
    <button class="btn btn-pdf" id="btn-pdf">📄 PDF</button>
    <button class="btn btn-red" id="btn-reset">Reset</button>
  </div>
</header>
<div id="hint">Tap on the map to add a note</div>
<div id="map-wrapper">
  <img id="mapImg" src="camping-castell-montgri-plattegrond.jpg" alt="Mappa campeggio" />
</div>
<button id="toggle-list">▼ Note List</button>
<div id="list-panel"></div>

<!-- MODAL: edit -->
<div class="overlay" id="overlay-edit">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2 id="edit-title"> Note</h2>
    <label>Number bungalow</label>
    <input id="edit-num" type="number" inputmode="numeric" placeholder="Es: 26" />
    <label>Note</label>
    <textarea id="edit-text" placeholder="Es: BBQ No Fire&#10;Grill Grate&#10;Arriva sabato&#10;..."></textarea>
    <div class="btn-row">
      <button class="btn btn-red"  id="btn-del" style="display:none">Remove</button>
      <button class="btn btn-gray" id="btn-cancel">Cancel</button>
      <button class="btn btn-blue" id="btn-save">Save</button>
    </div>
  </div>
</div>

<!-- MODAL: view -->
<div class="overlay" id="overlay-view">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2 id="view-title">Bungalow</h2>
    <div class="note-text" id="view-text"></div>
    <div class="btn-row">
      <button class="btn btn-gray"  id="btn-view-edit">✏️ edit</button>
      <button class="btn btn-green" id="btn-done">✓ Done — remove</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-gray" id="btn-view-close">close</button>
    </div>
  </div>
</div>

<!-- MODAL: share -->
<div class="overlay" id="overlay-share">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2> Share notes</h2>
    <textarea class="share-textarea" id="share-text" readonly></textarea>
    <div class="btn-row">
      <button class="btn btn-wa"   id="btn-wa-send">📲 Open WhatsApp</button>
      <button class="btn btn-gray" id="btn-copy">copy</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-gray" id="btn-share-close">close</button>
    </div>
  </div>
</div>

<!-- MODAL: confirm reset -->
<div class="overlay center" id="overlay-confirm">
  <div class="confirm-box">
    <p>Delete all notes and start over?</p>
    <div class="btn-row">
      <button class="btn btn-red"  id="btn-reset-yes">Yes, reset</button>
      <button class="btn btn-gray" id="btn-reset-no"> Canceled</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'montgri_v3';
let annotations = [], userName = '', todayStr = '';
let pendingX, pendingY, editingId = null, viewingId = null;

// ── WELCOME ──
(function() {
  const now = new Date();
  todayStr = now.toLocaleDateString('En-GB', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
  document.getElementById('welcome-date').textContent = '📅 ' + todayStr;
  try {
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    if (s.date === now.toDateString() && s.name) {
      userName = s.name; annotations = s.annotations || [];
      launchApp(); return;
    }
  } catch(e) {}
  setTimeout(() => document.getElementById('input-name').focus(), 300);
})();

document.getElementById('btn-start').addEventListener('click', startSession);
document.getElementById('input-name').addEventListener('keydown', e => { if (e.key === 'Enter') startSession(); });

function startSession() {
  const n = document.getElementById('input-name').value.trim();
  if (!n) { document.getElementById('input-name').focus(); return; }
  userName = n; annotations = []; saveAll(); launchApp();
}

function launchApp() {
  document.getElementById('welcome-screen').style.display = 'none';
  document.getElementById('header-name').textContent =
    '🏕️ ' + userName + ' · ' + new Date().toLocaleDateString('En-GB', { month:'short', day:'numeric'});
  render();
}

function saveAll() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ date: new Date().toDateString(), name: userName, annotations })); } catch(e) {}
}

function updateCount() { document.getElementById('count-badge').textContent = annotations.length; }

function render() {
  document.querySelectorAll('.pin').forEach(e => e.remove());
  const wrapper = document.getElementById('map-wrapper');
  annotations.forEach(a => {
    const pin = document.createElement('div');
    pin.className = 'pin'; pin.style.left = a.x + '%'; pin.style.top = a.y + '%'; pin.dataset.id = a.id;
    pin.innerHTML = '<div class="pin-circle"></div>';
    pin.addEventListener('click', ev => { ev.stopPropagation(); openView(a.id); });
    wrapper.appendChild(pin);
  });
  renderList(); updateCount();
}

function renderList() {
  const panel = document.getElementById('list-panel');
  if (!annotations.length) { panel.innerHTML = '<p style="padding:12px 14px;color:#6b9e6b;font-size:13px">Nessuna nota ancora.</p>'; return; }
  panel.innerHTML = annotations.map(a =>
    `<div class="list-item" data-id="${a.id}">
      <div class="list-num">${esc(a.num||'?')}</div>
      <div class="list-text">${esc(a.text)}</div>
    </div>`
  ).join('');
  panel.querySelectorAll('.list-item').forEach(el => el.addEventListener('click', () => openView(Number(el.dataset.id))));
}

function esc(t) { return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

function openView(id) {
  viewingId = id; const a = annotations.find(a => a.id === id);
  document.getElementById('view-title').textContent = 'Bungalow ' + (a.num || '?');
  document.getElementById('view-text').textContent = a.text;
  document.getElementById('overlay-view').classList.add('open');
}
document.getElementById('btn-done').addEventListener('click', () => {
  annotations = annotations.filter(a => a.id !== viewingId); saveAll(); render();
  document.getElementById('overlay-view').classList.remove('open');
});
document.getElementById('btn-view-edit').addEventListener('click', () => {
  document.getElementById('overlay-view').classList.remove('open'); openEdit(viewingId);
});
document.getElementById('btn-view-close').addEventListener('click', () => { document.getElementById('overlay-view').classList.remove('open'); });

function openEdit(id) {
  editingId = id; const a = annotations.find(a => a.id === id);
  document.getElementById('edit-title').textContent = 'Modifica nota';
  document.getElementById('edit-num').value  = a.num  || '';
  document.getElementById('edit-text').value = a.text || '';
  document.getElementById('btn-del').style.display = '';
  document.getElementById('overlay-edit').classList.add('open');
  setTimeout(() => document.getElementById('edit-num').focus(), 150);
}

document.getElementById('map-wrapper').addEventListener('click', ev => {
  if (ev.target.closest('.pin')) return;
  const r = ev.currentTarget.getBoundingClientRect();
  pendingX = ((ev.clientX - r.left) / r.width  * 100).toFixed(2);
  pendingY = ((ev.clientY - r.top)  / r.height * 100).toFixed(2);
  editingId = null;
  document.getElementById('edit-title').textContent = 'New Note';
  document.getElementById('edit-num').value = ''; document.getElementById('edit-text').value = '';
  document.getElementById('btn-del').style.display = 'none';
  document.getElementById('overlay-edit').classList.add('open');
  setTimeout(() => document.getElementById('edit-num').focus(), 150);
});

document.getElementById('btn-save').addEventListener('click', () => {
  const txt = document.getElementById('edit-text').value.trim();
  const num = document.getElementById('edit-num').value.trim();
  if (!txt && !num) return;
  if (editingId !== null) { const a = annotations.find(a => a.id === editingId); if (a) { a.text = txt; a.num = num; } }
  else annotations.push({ id: Date.now(), x: pendingX, y: pendingY, text: txt, num });
  saveAll(); render(); document.getElementById('overlay-edit').classList.remove('open');
});
document.getElementById('btn-del').addEventListener('click', () => {
  annotations = annotations.filter(a => a.id !== editingId); saveAll(); render();
  document.getElementById('overlay-edit').classList.remove('open');
});
document.getElementById('btn-cancel').addEventListener('click', () => { document.getElementById('overlay-edit').classList.remove('open'); });

function buildMsg() {
  let t = `🏕️Camping Notes — ${userName}\n📅 ${todayStr}\n${'─'.repeat(30)}\n`;
  if (!annotations.length) t += '\nNo notes today.';
  else annotations.forEach(a => { t += `\n🔴 Bungalow ${a.num||'?'}:\n${a.text}\n`; });
  return t;
}

// WhatsApp
document.getElementById('btn-wa').addEventListener('click', () => {
  document.getElementById('share-text').value = buildMsg();
  document.getElementById('overlay-share').classList.add('open');
});
document.getElementById('btn-wa-send').addEventListener('click', () => {
  window.open('https://wa.me/?text=' + encodeURIComponent(document.getElementById('share-text').value), '_blank');
});
document.getElementById('btn-copy').addEventListener('click', () => {
  const ta = document.getElementById('share-text'); ta.select();
  try { if (navigator.clipboard) navigator.clipboard.writeText(ta.value); else document.execCommand('copy'); } catch(e) {}
  const b = document.getElementById('btn-copy'); b.textContent = '✓ Copiato';
  setTimeout(() => b.textContent = 'Copia', 2000);
});
document.getElementById('btn-share-close').addEventListener('click', () => { document.getElementById('overlay-share').classList.remove('open'); });

// PDF
document.getElementById('btn-pdf').addEventListener('click', () => {
  const today = new Date().toLocaleDateString('En-GB', { month:'long', day:'numeric', year:'numeric'});
  let rows = annotations.length ? annotations.map(a =>
    `<tr><td style="font-weight:700;color:#c0392b;padding:10px 14px;border-bottom:1px solid #eee;vertical-align:top;white-space:nowrap">Bungalow ${a.num||'?'}</td>
     <td style="padding:10px 14px;border-bottom:1px solid #eee;font-size:13px;line-height:1.7;vertical-align:top;white-space:pre-wrap">${a.text}</td></tr>`
  ).join('') : '<tr><td colspan="2" style="padding:20px;color:#999;text-align:center">Nessuna nota oggi.</td></tr>';

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Note ${userName}</title>
  <style>body{font-family:Arial,sans-serif;padding:28px;color:#222}h1{color:#1a5c1a;font-size:19px;margin-bottom:4px}.sub{color:#666;font-size:13px;margin-bottom:22px}table{width:100%;border-collapse:collapse}th{background:#1a5c1a;color:#fff;padding:10px 14px;text-align:left;font-size:13px}tr:nth-child(even) td{background:#f6faf6}.footer{margin-top:20px;font-size:11px;color:#bbb}</style>
  </head><body>
  <h1>🏕️ Lifestyle Holiday</h1>
  <div class="sub">Operator: <strong>${userName}</strong> &nbsp;|&nbsp; Date: ${today}</div>
  <table><thead><tr><th>Bungalow</th><th>Note</th></tr></thead><tbody>${rows}</tbody></table>
  <div class="footer">Generated the ${new Date().toLocaleString('En-GB')}</div>
  <script>window.onload=function(){window.print()}<\/script></body></html>`;

  const blob = new Blob([html], {type:'text/html'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `note-${userName.toLowerCase()}-${new Date().toISOString().slice(0,10)}.html`;
  a.click(); URL.revokeObjectURL(url);
});

// Reset
document.getElementById('btn-reset').addEventListener('click', () => { document.getElementById('overlay-confirm').classList.add('open'); });
document.getElementById('btn-reset-yes').addEventListener('click', () => { localStorage.removeItem(STORAGE_KEY); location.reload(); });
document.getElementById('btn-reset-no').addEventListener('click', () => { document.getElementById('overlay-confirm').classList.remove('open'); });

// List toggle
document.getElementById('toggle-list').addEventListener('click', () => {
  const p = document.getElementById('list-panel'); const o = p.classList.toggle('open');
  document.getElementById('toggle-list').textContent = o ? '▲ NOTE LIST' : '▼ NOTE LIST';
});

// Backdrop close
['overlay-edit','overlay-view','overlay-share'].forEach(id => {
  document.getElementById(id).addEventListener('click', function(e) { if (e.target === this) this.classList.remove('open'); });
});
</script>
</body>
</html>
