<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=10.0, user-scalable=yes"/>
<title>Camping Castell Montgrí - Calibrage</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#111d11;color:#fff;min-height:100vh}

/* ── HOME SCREEN ── */
#home-screen{position:fixed;inset:0;background:#111d11;z-index:9999;display:flex;flex-direction:column;overflow-y:auto}
.home-header{background:#1e3320;padding:18px 16px 14px;border-bottom:1px solid #2d4a2d;display:flex;align-items:center;gap:10px;flex-shrink:0}
.home-header h1{font-size:18px;font-weight:800;color:#a8d5a2;flex:1}
.home-header .today{font-size:11px;color:#6b9e6b;margin-top:2px}
.home-body{flex:1;padding:14px 14px 100px}
.section-title{font-size:11px;color:#6b9e6b;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin:18px 0 8px}
.map-card{background:#1e3320;border-radius:12px;border:1px solid #2d4a2d;padding:13px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px}
.map-card-num{font-size:15px;font-weight:800;color:#a8d5a2}
.map-card-sub{font-size:12px;color:#6b9e6b;margin-top:2px}
.map-card-badge{background:#dc2626;color:#fff;font-size:10px;font-weight:800;border-radius:99px;padding:2px 8px}
.map-card-del{background:#3d1a1a;color:#f87171;border:none;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer}
.fab{position:fixed;bottom:24px;right:20px;z-index:10000;background:#22c55e;color:#fff;border:none;border-radius:99px;padding:14px 22px;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.4)}

/* ── MAP VIEW ── */
#map-view{display:none;flex-direction:column;height:100vh;position:fixed;inset:0;z-index:100}
#map-view.open{display:flex}
#mv-header{background:#1e3320;padding:8px 10px;flex-shrink:0;display:flex;align-items:center;gap:8px;border-bottom:1px solid #2d4a2d}
#mv-back{background:#3d5c3d;border:none;color:#c8e6c8;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer}
#mv-title{flex:1;font-size:12px;font-weight:700;color:#a8d5a2;overflow:hidden;text-overflow:ellipsis}
.mv-btn{font-size:11px;padding:6px 9px;border-radius:7px;cursor:pointer;border:none;font-weight:700}
.mv-pdf{background:#7c3aed;color:#fff}
#mv-hint{background:#162616;text-align:center;font-size:11px;color:#6b9e6b;padding:4px}
#map-container{flex:1;overflow:auto;position:relative;touch-action:pan-x pan-y}
#map-wrapper{position:relative;width:100%}
#mapImg{width:100%;display:block;user-select:none}
.pin{position:absolute;transform:translate(-50%,-50%);z-index:20;width:10px;height:10px;display:flex;align-items:center;justify-content:center}
.pin-dot{width:6px;height:6px;background:#dc2626;border-radius:50%;border:1px solid #fff}

/* ── MODALS ── */
.fs-modal{display:none;position:fixed;inset:0;z-index:500;background:#111d11;flex-direction:column}
.fs-modal.open{display:flex}
.fs-top{background:#1e3320;padding:12px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #2d4a2d}
.fs-close{background:#3d5c3d;border:none;color:#c8e6c8;border-radius:20px;padding:5px 14px;font-size:13px;font-weight:700}
.fs-body{flex:1;padding:16px;display:flex;flex-direction:column;gap:12px}
.fs-label{font-size:11px;color:#6b9e6b;font-weight:700;text-transform:uppercase}
.zone-tag{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700}
.fs-input{width:100%;font-size:20px;background:#162616;border:1px solid #3d5c3d;border-radius:10px;padding:11px;color:#e8f5e8}
.fs-textarea{width:100%;flex:1;background:#162616;border:1px solid #3d5c3d;border-radius:10px;padding:12px;color:#e8f5e8;resize:none}
.fs-footer{background:#1e3320;padding:12px 14px 28px;display:flex;gap:8px}
.fs-footer button{flex:1;padding:13px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer}
.fsf-save{background:#1d4ed8;color:#fff}
.fsf-cancel{background:#3d5c3d;color:#c8e6c8}

/* Dialogs */
.name-dialog, .confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:10001;display:none;align-items:center;justify-content:center}
.name-dialog.open, .confirm-overlay.open{display:flex}
.name-box{background:#1e3320;border-radius:16px;padding:22px;width:290px;border:1px solid #2d4a2d}
</style>
</head>
<body>

<div id="home-screen">
  <div class="home-header">
    <div><h1>🏕️ Montgrí Map</h1><div class="today" id="home-today"></div></div>
  </div>
  <div class="home-body">
    <div class="section-title">My Maps</div>
    <div id="my-maps-list"></div>
  </div>
  <button class="fab" id="btn-new-map">+ New map</button>
</div>

<div class="name-dialog" id="name-dialog">
  <div class="name-box">
    <h3 style="margin-bottom:10px">Your Name</h3>
    <input id="name-input" class="fs-input" type="text" placeholder="Vanessa"/>
    <div style="display:flex;gap:8px;margin-top:15px">
      <button onclick="document.getElementById('name-dialog').classList.remove('open')" style="flex:1;padding:10px;background:#3d5c3d;border:none;border-radius:8px;color:#fff">Cancel</button>
      <button id="nb-ok" style="flex:1;padding:10px;background:#22c55e;border:none;border-radius:8px;color:#fff">Create</button>
    </div>
  </div>
</div>

<div id="map-view">
  <div id="mv-header">
    <button id="mv-back">← Back</button>
    <div id="mv-title">—</div>
    <button class="mv-btn mv-pdf" id="mv-pdf">📄 PDF</button>
  </div>
  <div id="mv-hint">Tap anywhere to add a bungalow</div>
  <div id="map-container">
    <div id="map-wrapper">
      <img id="mapImg" src="camping-castell-montgri-plattegrond.jpg" crossorigin="anonymous" alt="Map"/>
    </div>
  </div>
</div>

<div class="fs-modal" id="edit-modal">
  <div class="fs-top"><h2>Add Bungalow</h2><button class="fs-close" onclick="document.getElementById('edit-modal').classList.remove('open')">✕</button></div>
  <div class="fs-body">
    <div><div class="fs-label">Detected Zone</div><span class="zone-tag" id="edit-zone-tag">Unknown</span></div>
    <div><div class="fs-label">Bungalow Number</div><input class="fs-input" id="edit-num" type="number" inputmode="numeric" placeholder="26"/></div>
    <div style="flex:1;display:flex;flex-direction:column;gap:6px"><div class="fs-label">Notes</div><textarea class="fs-textarea" id="edit-text"></textarea></div>
  </div>
  <div class="fs-footer">
    <button class="fsf-cancel" onclick="document.getElementById('edit-modal').classList.remove('open')">Cancel</button>
    <button class="fsf-save" id="edit-save">Save</button>
  </div>
</div>

<script>
// ═══════════════════════════════
// 1. DÉTECTION COULEUR (À CALIBRER ENSEMBLE)
// ═══════════════════════════════
const mapImg = document.getElementById('mapImg');
const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });

// Ces couleurs sont des estimations. On les ajustera après ton test.
const ZONES_CONFIG = [
  { name: 'Yellow', rgb: [234, 179, 8],  bg: '#eab308', color: '#000' },
  { name: 'Grey',   rgb: [107, 114, 128], bg: '#6b7280', color: '#fff' },
  { name: 'Brown',  rgb: [146, 64, 14],  bg: '#92400e', color: '#fff' },
  { name: 'Orange', rgb: [234, 88, 12],  bg: '#ea580c', color: '#fff' },
  { name: 'Blue',   rgb: [29, 78, 216],  bg: '#1d4ed8', color: '#fff' },
  { name: 'Red',    rgb: [220, 38, 38],  bg: '#dc2626', color: '#fff' }
];

mapImg.onload = () => {
  canvas.width = mapImg.naturalWidth;
  canvas.height = mapImg.naturalHeight;
  ctx.drawImage(mapImg, 0, 0);
  console.log("Canvas prêt. Taille :", canvas.width, "x", canvas.height);
};

function getZoneByPixel(xPct, yPct) {
  if (canvas.width === 0) return null;
  const x = (xPct / 100) * canvas.width;
  const y = (yPct / 100) * canvas.height;
  const p = ctx.getImageData(x, y, 1, 1).data;
  
  // LOG POUR LE TRAVAIL ENSEMBLE :
  console.log(`Clic à ${xPct}% , ${yPct}% | RVB détecté : [${p[0]}, ${p[1]}, ${p[2]}]`);

  let closest = null;
  let minDom = 100; // Tolérance de distance de couleur (plus c'est haut, plus c'est souple)

  for (let z of ZONES_CONFIG) {
    const d = Math.sqrt(Math.pow(p[0]-z.rgb[0],2) + Math.pow(p[1]-z.rgb[1],2) + Math.pow(p[2]-z.rgb[2],2));
    if (d < minDom) {
      minDom = d;
      closest = z;
    }
  }
  return minDom < 80 ? closest : null; // Si la couleur est trop loin (ex: fond noir), on renvoie null
}

// ═══════════════════════════════
// 2. LOGIQUE DU STOCKAGE
// ═══════════════════════════════
const SK='montgri_v5';
let store = JSON.parse(localStorage.getItem(SK) || '{"myMaps":{}}');
let currentMap = null;
let pendingX, pendingY;

function save(){ localStorage.setItem(SK, JSON.stringify(store)); }

// ═══════════════════════════════
// 3. UI & INTERACTIONS
// ═══════════════════════════════
function renderHome(){
  const list = document.getElementById('my-maps-list');
  const ids = Object.keys(store.myMaps);
  list.innerHTML = ids.length ? ids.map(id => `
    <div class="map-card" onclick="openMap('${id}')">
      <div style="flex:1">
        <div class="map-card-num">Map #${store.myMaps[id].num} - ${store.myMaps[id].userName}</div>
        <div class="map-card-sub">${store.myMaps[id].annotations.length} notes</div>
      </div>
      <button class="map-card-del" onclick="event.stopPropagation(); deleteMap('${id}')">🗑</button>
    </div>`).join('') : '<p>No maps yet.</p>';
}

function openMap(id){
  currentMap = store.myMaps[id];
  document.getElementById('home-screen').style.display='none';
  document.getElementById('map-view').classList.add('open');
  document.getElementById('mv-title').textContent = "Map - " + currentMap.userName;
  renderPins();
}

function renderPins(){
  document.querySelectorAll('.pin').forEach(p=>p.remove());
  currentMap.annotations.forEach(a => {
    const pin = document.createElement('div');
    pin.className = 'pin'; pin.style.left = a.x + '%'; pin.style.top = a.y + '%';
    pin.innerHTML = '<div class="pin-dot"></div>';
    document.getElementById('map-wrapper').appendChild(pin);
  });
}

// Tap sur la carte
document.getElementById('map-wrapper').addEventListener('click', (e) => {
  const rect = mapImg.getBoundingClientRect();
  pendingX = ((e.clientX - rect.left) / rect.width * 100).toFixed(2);
  pendingY = ((e.clientY - rect.top) / rect.height * 100).toFixed(2);
  
  const zone = getZoneByPixel(pendingX, pendingY);
  const tag = document.getElementById('edit-zone-tag');
  
  if(zone){
    tag.textContent = zone.name + " Zone";
    tag.style.background = zone.bg;
    tag.style.color = zone.color;
    document.getElementById('edit-text').value = zone.name + " Bungalow ";
  } else {
    tag.textContent = "Unknown Zone";
    tag.style.background = "#374151";
    document.getElementById('edit-text').value = "";
  }
  
  document.getElementById('edit-num').value = "";
  document.getElementById('edit-modal').classList.add('open');
});

document.getElementById('edit-save').addEventListener('click', () => {
  const num = document.getElementById('edit-num').value;
  const txt = document.getElementById('edit-text').value;
  currentMap.annotations.push({x: pendingX, y: pendingY, num, text: txt});
  save(); renderPins();
  document.getElementById('edit-modal').classList.remove('open');
});

document.getElementById('btn-new-map').addEventListener('click', () => {
  document.getElementById('name-dialog').classList.add('open');
});

document.getElementById('nb-ok').addEventListener('click', () => {
  const name = document.getElementById('name-input').value;
  if(!name) return;
  const id = 'm' + Date.now();
  store.myMaps[id] = {id, userName: name, num: Object.keys(store.myMaps).length+1, annotations: []};
  save(); renderHome();
  document.getElementById('name-dialog').classList.remove('open');
  openMap(id);
});

document.getElementById('mv-back').addEventListener('click', () => {
  document.getElementById('map-view').classList.remove('open');
  document.getElementById('home-screen').style.display='flex';
  renderHome();
});

function deleteMap(id){ if(confirm("Delete?")){ delete store.myMaps[id]; save(); renderHome(); } }

window.onload = renderHome;
</script>
</body>
</html>
