<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=10.0, user-scalable=yes"/>
<title>Camping Montgrí - Map Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#111d11;color:#fff;min-height:100vh}
#home-screen{position:fixed;inset:0;background:#111d11;z-index:9999;display:flex;flex-direction:column;overflow-y:auto}
.home-header{background:#1e3320;padding:18px 16px 14px;border-bottom:1px solid #2d4a2d}
.home-header h1{font-size:18px;font-weight:800;color:#a8d5a2}
.home-body{flex:1;padding:14px 14px 100px}
.map-card{background:#1e3320;border-radius:12px;border:1px solid #2d4a2d;padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.map-card-num{font-size:15px;font-weight:800;color:#a8d5a2}
.map-card-del{background:#3d1a1a;color:#f87171;border:none;border-radius:8px;padding:6px 10px;font-weight:700;cursor:pointer}
.fab{position:fixed;bottom:24px;right:20px;z-index:10000;background:#22c55e;color:#fff;border:none;border-radius:99px;padding:14px 22px;font-size:15px;font-weight:800;box-shadow:0 4px 16px rgba(0,0,0,0.4);cursor:pointer}
#map-view{display:none;flex-direction:column;height:100vh;position:fixed;inset:0;z-index:100}
#map-view.open{display:flex}
#mv-header{background:#1e3320;padding:8px 10px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #2d4a2d}
#mv-back{background:#3d5c3d;border:none;color:#c8e6c8;border-radius:8px;padding:6px 12px;font-weight:700;cursor:pointer}
#mv-title{flex:1;font-size:12px;font-weight:700;color:#a8d5a2}
#map-container{flex:1;overflow:auto;position:relative;background:#000}
#map-wrapper{position:relative;width:100%}
#mapImg{width:100%;display:block}

/* PIN ADJUSTED TO 3PX */
.pin{position:absolute;transform:translate(-50%,-50%);z-index:20;width:6px;height:6px;display:flex;align-items:center;justify-content:center}
.pin-dot{width:3px;height:3px;background:#ff0000;border-radius:50%;box-shadow: 0 0 0 1px #fff}

.fs-modal{display:none;position:fixed;inset:0;z-index:500;background:#111d11;flex-direction:column}
.fs-modal.open{display:flex}
.fs-top{background:#1e3320;padding:12px 14px;display:flex;justify-content:space-between;align-items:center}
.fs-close-btn{background:none;border:none;color:#fff;font-size:20px;cursor:pointer}
.fs-body{flex:1;padding:16px;display:flex;flex-direction:column;gap:15px}
.fs-input{width:100%;font-size:18px;background:#162616;border:1px solid #3d5c3d;border-radius:10px;padding:12px;color:#fff}
.zone-tag{display:inline-block;padding:5px 15px;border-radius:20px;font-size:13px;font-weight:800}
.name-dialog{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:10001;display:none;align-items:center;justify-content:center}
.name-dialog.open{display:flex}
.name-box{background:#1e3320;padding:20px;border-radius:16px;width:280px;border:1px solid #2d4a2d}
</style>
</head>
<body>

<div id="home-screen">
    <div class="home-header"><h1>🏕️ Montgrí Map Manager</h1></div>
    <div class="home-body"><div id="my-maps-list"></div></div>
    <button class="fab" id="btn-new-map">+ New map</button>
</div>

<div id="map-view">
    <div id="mv-header">
        <button id="mv-back">← Back</button>
        <div id="mv-title">Map</div>
    </div>
    <div id="map-container">
        <div id="map-wrapper">
            <img id="mapImg" src="camping-castell-montgri-plattegrond.jpg" crossorigin="anonymous" alt="Map"/>
        </div>
    </div>
</div>

<div class="fs-modal" id="edit-modal">
    <div class="fs-top"><h3>Bungalow Details</h3><button class="fs-close-btn" onclick="document.getElementById('edit-modal').classList.remove('open')">✕</button></div>
    <div class="fs-body">
        <div><p style="font-size:11px;color:#6b9e6b;margin-bottom:5px">ZONE</p><span class="zone-tag" id="edit-zone-tag">Unknown</span></div>
        <input class="fs-input" id="edit-num" type="number" inputmode="numeric" placeholder="Number (e.g., 26)"/>
        <textarea class="fs-input" id="edit-text" style="height:100px" placeholder="Notes..."></textarea>
        <button id="edit-save" style="background:#22c55e;color:#fff;padding:15px;border:none;border-radius:10px;font-weight:800;cursor:pointer">SAVE BUNGALOW</button>
    </div>
</div>

<div class="name-dialog" id="name-dialog">
    <div class="name-box">
        <h4 style="margin-bottom:10px">Map Name</h4>
        <input id="name-input" class="fs-input" type="text" placeholder="e.g., Vanessa"/>
        <button id="nb-ok" style="width:100%;margin-top:15px;padding:12px;background:#22c55e;border:none;color:#fff;border-radius:8px;font-weight:700;cursor:pointer">Create</button>
    </div>
</div>

<script>
const mapImg = document.getElementById('mapImg');
const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });

const ZONES_CONFIG = [
  { name: 'Grey',   rgb: [179, 179, 179], bg: '#6b7280', color: '#fff' }, 
  { name: 'Yellow', rgb: [252, 242, 31],  bg: '#facc15', color: '#000' }, 
  { name: 'Orange', rgb: [235, 130, 12],  bg: '#ea580c', color: '#fff' },
  { name: 'Blue',   rgb: [25, 145, 205],  bg: '#1d4ed8', color: '#fff' },
  { name: 'Brown',  rgb: [141, 99, 83],   bg: '#92400e', color: '#fff' }, 
  { name: 'Red',    rgb: [220, 38, 38],   bg: '#dc2626', color: '#fff' }
];

mapImg.onload = () => {
    canvas.width = mapImg.naturalWidth;
    canvas.height = mapImg.naturalHeight;
    ctx.drawImage(mapImg, 0, 0);
};

function getZoneByPixel(xPct, yPct) {
    if (canvas.width === 0) return null;
    const x = (xPct / 100) * canvas.width;
    const y = (yPct / 100) * canvas.height;
    const p = ctx.getImageData(x, y, 1, 1).data;
    const bright = p[0] + p[1] + p[2];
    if (bright > 745 || bright < 35) return null;

    let closest = null;
    let minDistance = Infinity;
    for (let z of ZONES_CONFIG) {
        const d = Math.sqrt(Math.pow(p[0]-z.rgb[0],2)+Math.pow(p[1]-z.rgb[1],2)+Math.pow(p[2]-z.rgb[2],2));
        if (d < minDistance) { minDistance = d; closest = z; }
    }
    return closest; 
}

const SK='montgri_v5';
let store = JSON.parse(localStorage.getItem(SK) || '{"myMaps":{}}');
let currentMap = null;
let pX, pY;

function save(){ localStorage.setItem(SK, JSON.stringify(store)); }

function renderHome(){
    const list = document.getElementById('my-maps-list');
    const ids = Object.keys(store.myMaps);
    list.innerHTML = ids.length ? ids.map(id => `
        <div class="map-card" onclick="openMap('${id}')">
            <div style="flex:1">
                <div class="map-card-num">Map: ${store.myMaps[id].userName}</div>
                <div style="font-size:12px;color:#6b9e6b">${store.myMaps[id].annotations.length} bungalows</div>
            </div>
            <button class="map-card-del" onclick="event.stopPropagation(); deleteMap('${id}')">🗑</button>
        </div>`).join('') : '<p style="text-align:center;color:#6b9e6b;margin-top:20px">No maps found.</p>';
}

function openMap(id){
    currentMap = store.myMaps[id];
    document.getElementById('home-screen').style.display='none';
    document.getElementById('map-view').classList.add('open');
    document.getElementById('mv-title').textContent = currentMap.userName;
    renderPins();
}

function renderPins(){
    document.querySelectorAll('.pin').forEach(p=>p.remove());
    currentMap.annotations.forEach(a => {
        const pin = document.createElement('div');
        pin.className = 'pin'; pin.style.left = a.x + '%'; pin.style.top = a.y + '%';
        pin.innerHTML = '<div class="pin-dot"></div>';
        document.getElementById('map-wrapper').appendChild(pin);
    });
}

document.getElementById('map-wrapper').addEventListener('click', (e) => {
    const rect = mapImg.getBoundingClientRect();
    pX = ((e.clientX - rect.left) / rect.width * 100).toFixed(2);
    pY = ((e.clientY - rect.top) / rect.height * 100).toFixed(2);
    const zone = getZoneByPixel(pX, pY);
    const tag = document.getElementById('edit-zone-tag');
    if(zone){
        tag.textContent = zone.name + " Zone";
        tag.style.background = zone.bg; tag.style.color = zone.color;
        document.getElementById('edit-text').value = zone.name + " Bungalow ";
    } else {
        tag.textContent = "Unknown Zone";
        tag.style.background = "#374151"; tag.style.color = "#fff";
        document.getElementById('edit-text').value = "";
    }
    document.getElementById('edit-num').value = "";
    document.getElementById('edit-modal').classList.add('open');
    setTimeout(() => document.getElementById('edit-num').focus(), 300);
});

document.getElementById('edit-save').addEventListener('click', () => {
    const num = document.getElementById('edit-num').value;
    const txt = document.getElementById('edit-text').value;
    if(!num && !txt) return;
    currentMap.annotations.push({x: pX, y: pY, num, text: txt});
    save(); renderPins();
    document.getElementById('edit-modal').classList.remove('open');
});

document.getElementById('btn-new-map').addEventListener('click', () => {
    document.getElementById('name-input').value = "";
    document.getElementById('name-dialog').classList.add('open');
});

document.getElementById('nb-ok').addEventListener('click', () => {
    const name = document.getElementById('name-input').value.trim();
    if(!name) return;
    const id = 'm' + Date.now();
    store.myMaps[id] = {id, userName: name, annotations: []};
    save(); renderHome();
    document.getElementById('name-dialog').classList.remove('open');
    openMap(id);
});

document.getElementById('mv-back').addEventListener('click', () => {
    document.getElementById('map-view').classList.remove('open');
    document.getElementById('home-screen').style.display='flex';
    renderHome();
});

function deleteMap(id){ if(confirm("Delete this map?")){ delete store.myMaps[id]; save(); renderHome(); } }

window.onload = renderHome;
</script>
</body>
</html>
